server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Don't let the browser cache the service worker or app shell (so updates land).
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API -> FastAPI backend (service name "backend" on the compose network)
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;   # allow base64 photos in report payloads
    }

    # Everything else -> the PWA (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
