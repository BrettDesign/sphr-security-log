# Render Blueprint for SPHR Security Log.
# In Render: New + -> Blueprint -> connect this GitHub repo -> Apply.
# It creates TWO services from this repo:
#   1) sphr-backend  — the FastAPI API (Docker)
#   2) sphr-frontend — the installable PWA (static site)
# The database is MongoDB Atlas (free) — you paste its connection string as
# MONGO_URL when prompted (see README / chat instructions).
#
# The frontend is automatically told the backend's address via `fromService`,
# so there is nothing to copy/paste between the two services.

services:
  # ---------- Backend API (FastAPI, Docker) ----------
  - type: web
    name: sphr-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free            # change to "starter" (~$7/mo) to stop it sleeping
    healthCheckPath: /api/
    envVars:
      - key: DB_NAME
        value: sphr_security
      - key: BREVO_SENDER_NAME
        value: SPHR Nightly Security
      - key: MONGO_URL        # paste your MongoDB Atlas connection string
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: DM_RECIPIENT_EMAIL
        sync: false

  # ---------- Frontend PWA (Expo web, static) ----------
  - type: web
    name: sphr-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npx expo export --platform web --output-dir dist
    staticPublishPath: dist
    envVars:
      # Full URL of the backend service, e.g. https://sphr-backend-xxxx.onrender.com
      # Set this to your deployed sphr-backend URL (Render asks for it on Apply).
      # (Baked in at build time — change it here, then redeploy the frontend.)
      - key: EXPO_PUBLIC_BACKEND_URL
        sync: false
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    routes:
      # Single-page-app fallback so deep links / refresh work.
      - type: rewrite
        source: /*
        destination: /index.html
